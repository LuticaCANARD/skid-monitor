<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0d1218" />
    <title>Skid Monitor Control Room</title>
    <script>
      window.addEventListener("TrunkApplicationStarted", async () => {
        const canvas = document.getElementById("skid-monitor-canvas");
        const loading = document.getElementById("loading");
        const app = new window.wasmBindings.WebHandle();

        try {
          await app.start(canvas);
          loading.remove();
          window.skidMonitorApp = app;
        } catch (error) {
          loading.textContent = `Failed to start Skid Monitor: ${error}`;
          throw error;
        }
      });
    </script>
    <link
      data-trunk
      rel="rust"
      data-cargo-no-default-features
      data-cargo-features="web"
      data-target-name="skid_monitor_fe"
      data-wasm-opt="2"
    />
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #0d1218;
      }

      #skid-monitor-canvas {
        width: 100%;
        height: 100%;
        display: block;
      }

      #loading {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        color: #c6d1dc;
        font: 14px/1.5 system-ui, sans-serif;
      }
    </style>
  </head>
  <body>
    <div id="loading">Starting Skid Monitor…</div>
    <canvas id="skid-monitor-canvas"></canvas>
  </body>
</html>
