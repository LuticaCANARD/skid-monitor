[package]
name = "skid-monitor-fe"
version.workspace = true
edition.workspace = true

[features]
default = ["low-spec"]
low-spec = ["eframe/glow"]
high-spec = ["eframe/wgpu"]

[dependencies]
eframe = { version = "0.35", default-features = false, features = ["default_fonts", "wayland", "x11"] }
skid-monitor-client.workspace = true
skid-protocol.workspace = true
